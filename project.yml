name: StickerMatch
options:
  bundleIdPrefix: com.stickermatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  StickerMatch:
    type: application
    platform: iOS
    sources:
      - path: StickerMatch
        excludes:
          - "Info.plist"
          - "**/*.entitlements"
          - "Config/Secrets.xcconfig"
          - "Config/Secrets.example.xcconfig"
    dependencies:
      - package: Supabase
        product: Supabase
    configFiles:
      Debug: StickerMatch/Config/Secrets.xcconfig
      Release: StickerMatch/Config/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stickermatch.app
        DEVELOPMENT_TEAM: T82VDBUCDV
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: StickerMatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: StickerMatch/StickerMatch.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES

  StickerMatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: StickerMatch
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.stickermatch.tests
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/StickerMatch.app/StickerMatch"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  StickerMatch:
    build:
      targets:
        StickerMatch: all
        StickerMatchTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - StickerMatchTests
